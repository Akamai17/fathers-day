<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Happy Father's Day</title>
<meta name="theme-color" content="#0b0f14" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&display=swap" rel="stylesheet">
<style>
  /* =========================================================
     PERSONALIZE EVERYTHING IN THE <script> CONFIG NEAR THE BOTTOM.
     You shouldn't need to touch the CSS below.
     ========================================================= */
  :root{
    --bg:#0b0f14;
    --term-green:#39d98a;
    --term-dim:#5b6b7a;
    --term-white:#e6edf3;
    --accent1:#ff8a5c;
    --accent2:#ff5c8a;
    --accent3:#7c5cff;
    --card-ink:#3a2a2a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--term-white);
    font-family:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .screen{
    position:fixed; inset:0;
    display:flex; flex-direction:column;
    padding:max(20px,env(safe-area-inset-top)) 20px 20px;
  }

  /* ---------- TERMINAL ---------- */
  #terminal{
    justify-content:flex-start;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(124,92,255,.10), transparent 60%),
      var(--bg);
  }
  .term-bar{
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--term-dim);
    border-bottom:1px solid rgba(255,255,255,.06);
    padding-bottom:10px; margin-bottom:16px;
  }
  .dot{width:11px;height:11px;border-radius:50%}
  .dot.r{background:#ff5f57}.dot.y{background:#febc2e}.dot.g{background:#28c840}
  .term-title{margin-left:8px}
  .term-body{
    font-size:clamp(13px,3.6vw,16px);
    line-height:1.7;
    white-space:pre-wrap;
    word-break:break-word;
  }
  .line{display:block}
  .ok{color:var(--term-green)}
  .dim{color:var(--term-dim)}
  .prompt{color:var(--accent1)}
  .cursor{
    display:inline-block;width:9px;height:1.15em;
    background:var(--term-green);vertical-align:-2px;margin-left:2px;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}
  .skip{
    position:fixed;right:16px;bottom:16px;z-index:5;
    background:rgba(255,255,255,.06);color:var(--term-dim);
    border:1px solid rgba(255,255,255,.12);border-radius:8px;
    font-family:inherit;font-size:12px;padding:8px 12px;cursor:pointer;
  }
  .skip:hover{color:var(--term-white)}

  /* ---------- CARD ---------- */
  #card{
    opacity:0; visibility:hidden; transform:scale(1.02);
    transition:opacity .9s ease, transform .9s ease;
    overflow-y:auto;
    align-items:center;
    background:
      radial-gradient(1000px 700px at 15% 0%, rgba(255,138,92,.22), transparent 55%),
      radial-gradient(900px 700px at 90% 20%, rgba(255,92,138,.20), transparent 55%),
      radial-gradient(1000px 800px at 50% 110%, rgba(124,92,255,.22), transparent 55%),
      #fff7f0;
    background-size:200% 200%;
    animation:drift 18s ease-in-out infinite;
    color:var(--card-ink);
    text-align:center;
    padding:48px 22px 60px;
  }
  @keyframes drift{0%,100%{background-position:0% 0%}50%{background-position:100% 100%}}
  #card.show{opacity:1;visibility:visible;transform:scale(1)}

  .card-inner{max-width:620px;margin:auto;width:100%}
  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;color:#b5642f;font-weight:700;margin-bottom:14px;
    opacity:0;transform:translateY(10px);
  }
  h1{
    font-family:'Fraunces',Georgia,serif;font-weight:700;
    font-size:clamp(34px,9vw,64px);line-height:1.02;
    color:#2a1a14;margin-bottom:6px;letter-spacing:-.01em;
    opacity:0;transform:translateY(14px);
  }
  .photo{
    width:120px;height:120px;border-radius:50%;object-fit:cover;
    border:4px solid #fff;box-shadow:0 10px 30px rgba(150,60,30,.25);
    margin:18px auto 6px;display:none;opacity:0;transform:scale(.9);
  }
  .message{
    font-family:'Fraunces',Georgia,serif;font-size:clamp(17px,4.6vw,21px);
    line-height:1.6;color:#4a342c;margin:22px auto 6px;max-width:540px;
    opacity:0;transform:translateY(14px);
  }
  .reasons{list-style:none;margin:26px auto 8px;max-width:520px;text-align:left}
  .reasons li{
    background:rgba(255,255,255,.6);
    border:1px solid rgba(180,90,50,.18);
    border-radius:14px;padding:14px 16px;margin:10px 0;
    font-size:clamp(14px,3.9vw,16px);line-height:1.5;color:#3a2a24;
    display:flex;gap:12px;align-items:flex-start;
    opacity:0;transform:translateY(16px);
    box-shadow:0 6px 18px rgba(150,60,30,.06);
  }
  .reasons li .n{
    font-family:'JetBrains Mono',monospace;font-weight:700;color:#d2693a;
    font-size:13px;padding-top:2px;white-space:nowrap;
  }
  .signoff{
    font-family:'Fraunces',Georgia,serif;font-style:italic;
    font-size:clamp(16px,4.4vw,20px);color:#3a2a24;margin-top:30px;
    opacity:0;transform:translateY(14px);
  }
  .signoff b{font-style:normal;font-weight:700}

  /* mini command bar on the card (the IT easter-egg) */
  .cmd{
    margin:34px auto 0;max-width:520px;
    background:#0b0f14;border-radius:12px;padding:12px 14px;text-align:left;
    font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--term-white);
    box-shadow:0 10px 30px rgba(0,0,0,.18);
    opacity:0;transform:translateY(16px);
  }
  .cmd .hint{color:var(--term-dim);font-size:11px;margin-bottom:8px}
  .cmd-row{display:flex;align-items:center;gap:8px}
  .cmd-row .ps{color:var(--accent1)}
  .cmd input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--term-green);font-family:inherit;font-size:13px;
  }
  .cmd-out{color:var(--term-green);margin-top:8px;white-space:pre-wrap;line-height:1.5;min-height:0}

  .reveal{opacity:1 !important;transform:none !important;
    transition:opacity .7s ease, transform .7s ease;}

  canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:9}

  @media (prefers-reduced-motion:reduce){
    *{animation:none !important;transition:opacity .2s linear !important}
  }
</style>
</head>
<body>

<!-- ============ TERMINAL ============ -->
<section id="terminal" class="screen" aria-label="terminal">
  <div class="term-bar">
    <span class="dot r"></span><span class="dot y"></span><span class="dot g"></span>
    <span class="term-title">— dad@home: ~/fathers-day</span>
  </div>
  <div class="term-body" id="termBody"></div>
  <button class="skip" id="skipBtn">skip ▸</button>
</section>

<!-- ============ CARD ============ -->
<section id="card" class="screen" aria-label="card">
  <div class="card-inner">
    <div class="eyebrow" id="eyebrow">june 21 · made just for you</div>
    <h1 id="title">Happy Father's Day</h1>
    <img class="photo" id="photo" alt="" />
    <p class="message" id="message"></p>
    <ul class="reasons" id="reasons"></ul>
    <p class="signoff" id="signoff"></p>

    <div class="cmd" id="cmd">
      <div class="hint">psst — it's still a terminal. try: <b>help</b>, <b>whoami</b>, <b>again</b></div>
      <div class="cmd-row">
        <span class="ps">dad@home:~$</span>
        <input id="cmdInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="type a command…" />
      </div>
      <div class="cmd-out" id="cmdOut"></div>
    </div>
  </div>
</section>

<canvas id="confetti"></canvas>

<script>
/* =================================================================
   ███  PERSONALIZE HERE  ███
   Edit the strings below. That's the whole job.
   ================================================================= */
const CONFIG = {
  // What the card calls him (Dad, Papa, his name…)
  dadName: "Dad",

  // His job flavor — used in a terminal line. Keep it short.
  jobTitle: "Senior Director",

  // The main heartfelt+funny note (1–3 sentences).
  message:
    "You've spent your whole life quietly taking care of everyone around you," +
    " so today it's your turn to relax and do nothing. " +
    "Thank you for being one of the steadiest and kindest people I know. " +
    "I won the dad lottery, and I know it.",

  // 3–6 reasons. Specifics + inside jokes > generic. Mix funny and sincere.
  reasons: [
    "You're usually pretty good at understanding what i mean.' ",
    "Somehow when you say 'it'll be fine,' I actually believe it.",
    "You have taught me to not give up even when things seem hopeless.",
    "You taught me more by how you handle things than by anything you ever said."
  ],

  // Easter-egg secret line (shows when he types `whoami` or clicks the title).
  secret: "the goat.",

  // Your sign-off.
  fromName: "Yuvan",

  // Optional photo: a URL or a file next to index.html (e.g. "dad.jpg"). Leave "" to skip.
  photoUrl: ""
};

/* ---- Terminal boot script (auto-generated from CONFIG; tweak if you like) ---- */
const BOOT_LINES = [
  {t:'cmd',  s:`sudo ./happy-fathers-day --user="${CONFIG.dadName}"`},
  {t:'ok',   s:`[ OK ] Authenticating ${CONFIG.jobTitle.toLowerCase()}... access granted`},
  {t:'ok',   s:`[ OK ] Loading 1 lifetime of memories........... done`},
  {t:'ok',   s:`[ OK ] Compiling reasons you're the best........ done`},
  {t:'ok',   s:`[ OK ] Running gratitude.test ................. ALL PASSED`},
  {t:'ok',   s:`[ OK ] Deploying to production ................ LIVE`},
  {t:'gap',  s:``},
  {t:'cmd',  s:`open card`},
];

/* ===================== ENGINE (no need to edit below) ===================== */
const termBody = document.getElementById('termBody');
const card = document.getElementById('card');
let booted = false;

function el(cls){const d=document.createElement('span');d.className='line '+(cls||'');termBody.appendChild(d);return d;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function typeLine(node, text, speed){
  for(let i=0;i<text.length;i++){ node.textContent+=text[i]; await sleep(speed); }
}

async function runBoot(){
  for(const line of BOOT_LINES){
    if(booted) return;
    if(line.t==='gap'){ el('').innerHTML='&nbsp;'; await sleep(120); continue; }
    if(line.t==='cmd'){
      const n=el('prompt');
      const ps=document.createElement('span'); ps.className='prompt'; ps.textContent='dad@home:~$ '; n.appendChild(ps);
      const txt=document.createElement('span'); txt.className='term-white'; n.appendChild(txt);
      const cur=document.createElement('span'); cur.className='cursor'; n.appendChild(cur);
      await typeLine(txt, line.s, 34);
      cur.remove();
      await sleep(260);
    } else {
      const cls = line.t==='ok'?'ok':(line.t==='dim'?'dim':'');
      const n=el(cls);
      await typeLine(n, line.s, 8);
      await sleep(160);
    }
  }
  await sleep(450);
  toCard();
}

function toCard(){
  if(booted) return; booted=true;
  document.getElementById('terminal').style.display='none';
  document.getElementById('skipBtn').style.display='none';
  card.classList.add('show');
  buildCard();
}

function buildCard(){
  // title text
  document.getElementById('title').innerHTML = `Happy Father's Day,<br>${escapeHtml(CONFIG.dadName)}`;
  document.getElementById('message').textContent = CONFIG.message;

  // photo
  if(CONFIG.photoUrl){
    const p=document.getElementById('photo');
    p.src=CONFIG.photoUrl; p.style.display='block';
  }

  // reasons
  const ul=document.getElementById('reasons');
  CONFIG.reasons.forEach((r,i)=>{
    const li=document.createElement('li');
    li.innerHTML=`<span class="n">${String(i+1).padStart(2,'0')}</span><span>${escapeHtml(r)}</span>`;
    ul.appendChild(li);
  });

  // signoff
  document.getElementById('signoff').innerHTML = `Love always,<br><b>${escapeHtml(CONFIG.fromName)}</b> 🧡`;

  // staged reveal
  const order=[
    document.getElementById('eyebrow'),
    document.getElementById('title'),
    document.getElementById('photo'),
    document.getElementById('message'),
    ...Array.from(ul.children),
    document.getElementById('signoff'),
    document.getElementById('cmd'),
  ].filter(Boolean);

  let d=180;
  order.forEach((node)=>{
    if(node.id==='photo' && !CONFIG.photoUrl) return;
    setTimeout(()=>node.classList.add('reveal'), d);
    d+=160;
  });

  setTimeout(fireConfetti, 520);
}

function escapeHtml(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}

/* ---------- easter-egg command bar ---------- */
const cmdInput=document.getElementById('cmdInput');
const cmdOut=document.getElementById('cmdOut');
function runCmd(raw){
  const c=raw.trim().toLowerCase();
  if(!c) return;
  let out='';
  switch(c){
    case 'help': out='available commands:\n  whoami   — who you really are\n  reasons  — recount the reasons\n  again    — replay the intro)'; break;
    case 'whoami': out=CONFIG.secret; fireConfetti(); break;
    case 'reasons': out=CONFIG.reasons.map((r,i)=>`  ${i+1}. ${r}`).join('\n'); break;
    case 'again': replay(); return;
    default: out=`command not found: ${raw}  (try 'help')`;
  }
  cmdOut.textContent=out;
}
cmdInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ runCmd(cmdInput.value); cmdInput.value=''; }});
document.getElementById('title').addEventListener('click',()=>{ cmdOut.textContent=CONFIG.secret; fireConfetti(); document.getElementById('cmd').scrollIntoView({behavior:'smooth'}); });

function replay(){
  booted=false; cmdOut.textContent=''; termBody.innerHTML='';
  card.classList.remove('show');
  Array.from(document.querySelectorAll('.reveal')).forEach(n=>n.classList.remove('reveal'));
  document.getElementById('reasons').innerHTML='';
  document.getElementById('terminal').style.display='';
  document.getElementById('skipBtn').style.display='';
  runBoot();
}

/* ---------- confetti ---------- */
const cv=document.getElementById('confetti'); const ctx=cv.getContext('2d');
let parts=[]; let raf=null;
function resize(){cv.width=innerWidth;cv.height=innerHeight;}
addEventListener('resize',resize); resize();
function fireConfetti(){
  const colors=['#ff8a5c','#ff5c8a','#7c5cff','#39d98a','#ffd166'];
  for(let i=0;i<120;i++){
    parts.push({
      x:innerWidth/2+(Math.random()-.5)*120,
      y:innerHeight*0.35,
      vx:(Math.random()-.5)*9,
      vy:Math.random()*-9-3,
      g:.22+Math.random()*.12,
      s:6+Math.random()*7,
      rot:Math.random()*6.28, vr:(Math.random()-.5)*.3,
      c:colors[(Math.random()*colors.length)|0],
      life:90+Math.random()*40
    });
  }
  if(!raf) raf=requestAnimationFrame(tick);
}
function tick(){
  ctx.clearRect(0,0,cv.width,cv.height);
  parts.forEach(p=>{
    p.vy+=p.g; p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.life--;
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
    ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6); ctx.restore();
  });
  parts=parts.filter(p=>p.life>0 && p.y<cv.height+40);
  if(parts.length){ raf=requestAnimationFrame(tick); } else { ctx.clearRect(0,0,cv.width,cv.height); raf=null; }
}

/* ---------- start ---------- */
document.getElementById('skipBtn').addEventListener('click',toCard);
runBoot();
</script>
</body>
</html>
